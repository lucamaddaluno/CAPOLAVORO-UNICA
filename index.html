<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoScout - Home</title>
    <style>
        /* RESET E FONT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* SFONDO ISPIRATO ALL'IMMAGINE (Cielo/Nuvole) */
        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }

        /* OVERLAY PER MIGLIORARE LA LEGGIBILITÀ */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.2); /* Leggero velo chiaro */
            z-index: -1;
        }

        /* CONTENITORE PULITO (STILE BARRA DI RICERCA) */
        .home-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 50px; /* Molto arrotondato come la search bar del sito */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* TITOLO ISPIRATO AL LOGO */
        h1 {
            margin-bottom: 10px;
            color: #1a1a1a;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: -1px;
            text-transform: lowercase; /* Per richiamare lo stile "autoscala" */
        }
        
        h1 span {
            font-weight: 700;
            color: #111;
        }

        .subtitle {
            margin-bottom: 40px;
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* BOTTONI - Stile pulito con il colore Teal del sito */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 25px;
            text-decoration: none;
            background: #fff;
            color: #444;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        /* Pulsante primario (Cerca/Inserisci) in Turchese */
        .btn-primary {
            background-color: #17b1c1; /* Il turchese di AutoScala */
            color: white;
            border: none;
        }

        /* Pulsante Elimina */
        .btn-delete {
            background-color: #f8f8f8;
            color: #cc0000;
            grid-column: span 2; /* Occupa tutta la riga in basso */
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            filter: brightness(1.05);
        }

        .btn-primary:hover {
            background-color: #1499a7;
        }

        /* MEDIA QUERY PER MOBILE */
        @media (max-width: 480px) {
            .btn-grid {
                grid-template-columns: 1fr;
            }
            .btn-delete {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="home-container">
        <h1>auto<span>scout</span></h1>
        <p class="subtitle">Guida il tuo futuro</p>

        <div class="btn-grid">
            <a href="creaauto.html" class="btn btn-primary">
                Inserisci Nuova Auto
            </a>

            <a href="cercaauto.html" class="btn btn-primary">
                Cerca Auto
            </a>

            <a href="modificaauto.html" class="btn">
                Modifica Auto
            </a>

            <a href="modificacarta.html" class="btn">
                Modifica Carta
            </a>

            <a href="eliminaauto.html" class="btn btn-delete">
                Elimina Veicolo
            </a>
        </div>
    </div>

</body>
</html>
